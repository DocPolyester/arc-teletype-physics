# Arc Cycles - Configuration

# Default mode for all rings (cycles | pendulum | gravity | spring | orbit | swing)
default_mode: cycles

# Optional: assign a different mode to each ring individually.
# Overrides default_mode. List of 4 mode names (ring 0 → ring 3).
# Example: all 4 rings in different modes
# ring_modes:
#   - cycles
#   - swing
#   - pendulum
#   - gravity

# Arc (via serialosc)
arc_host: "127.0.0.1"
arc_port: 14951
arc_prefix: "/monome"

# Arduino Serial Bridge (Arduino Nano V3.0 as I2C slave for Teletype)
# Hardware: Arduino Nano V3.0 via USB to RPi
#   Arduino A4=SDA, A5=SCL → Teletype I2C bus (4.7 kΩ pull-ups required, level shifter for 5V↔3.3V)
#   USB: /dev/ttyUSB1  (ttyUSB0 = monome Arc)
# I2C address: 0x31 (49 decimal → Teletype: IIA 49)
arduino_serial:
  enabled: true
  port: "/dev/ttyUSB1"
  address: 0x31
